<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖊️</text></svg>" />
    <title>Claude Whiteboard</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      .ask-claude-btn {
        background: #6965db;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0 12px;
        height: 2.25rem;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      .ask-claude-btn:hover:not(:disabled) { background: #5b57c9; }
      .ask-claude-btn:disabled { opacity: 0.6; cursor: default; }

      .clear-board-btn {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        width: 2.25rem;
        height: 2.25rem;
        font-size: 15px;
        cursor: pointer;
      }
      .clear-board-btn:hover:not(:disabled) { background: #ffe9e9; border-color: #e03131; }
      .clear-board-btn:disabled { opacity: 0.6; cursor: default; }

      .chat-user {
        margin: 8px 0 8px 48px;
        background: #6965db;
        color: #fff;
        border-radius: 14px 14px 4px 14px;
        padding: 8px 12px;
        font-size: 13.5px;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: break-word;
        width: fit-content;
        margin-left: auto;
        max-width: 85%;
      }
      .chat-marker {
        text-align: center;
        color: #999;
        font-size: 12px;
        font-style: italic;
        margin: 10px 0;
      }
      .chat-input-row {
        display: flex;
        gap: 8px;
        padding: 10px 12px;
        border-top: 1px solid #e5e5e5;
        background: #fff;
      }
      .chat-input-row textarea {
        flex: 1;
        resize: none;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 8px 10px;
        font-family: inherit;
        font-size: 13.5px;
        line-height: 1.4;
        outline: none;
      }
      .chat-input-row textarea:focus { border-color: #6965db; }
      .chat-input-row button {
        align-self: flex-end;
        background: #6965db;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .chat-input-row button:disabled { opacity: 0.5; cursor: default; }

      .claude-panel {
        width: 360px;
        flex-shrink: 0;
        border-left: 1px solid #e5e5e5;
        display: flex;
        flex-direction: column;
        background: #fafafa;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .claude-panel header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        border-bottom: 1px solid #e5e5e5;
        font-weight: 600;
        font-size: 14px;
      }
      .claude-panel header button {
        border: none;
        background: none;
        cursor: pointer;
        font-size: 14px;
        color: #666;
      }
      .panel-header-actions { display: flex; gap: 10px; align-items: center; }
      .claude-panel-body {
        overflow-y: auto;
        padding: 12px 14px;
        flex: 1;
      }
      .panel-status {
        background: #eceafd;
        color: #4a45a8;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        margin-bottom: 12px;
      }
      .panel-status.pulse { animation: panel-pulse 1.6s ease-in-out infinite; }
      @keyframes panel-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }
      .panel-empty { color: #999; font-size: 13px; padding: 8px 2px; }
      .panel-response {
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 10px;
        padding: 2px 14px 10px;
        margin-bottom: 12px;
      }
      .panel-time { font-size: 11px; color: #999; margin-top: 10px; }
      .panel-md { font-size: 13.5px; line-height: 1.55; color: #333; }
      .panel-md h1, .panel-md h2, .panel-md h3 { font-size: 15px; margin: 12px 0 4px; }
      .panel-md p { margin: 8px 0; }
      .panel-md ul, .panel-md ol { margin: 8px 0; padding-left: 20px; }
      .panel-md pre {
        overflow-x: auto;
        background: #f1f1f1;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
      }
      .panel-md code { background: #f1f1f1; border-radius: 4px; padding: 1px 4px; font-size: 12px; }
      .panel-md pre code { background: none; padding: 0; }
      .panel-md table { border-collapse: collapse; font-size: 12.5px; }
      .panel-md th, .panel-md td { border: 1px solid #ddd; padding: 4px 8px; }

      .panel-reopen {
        position: fixed;
        top: 70px;
        right: 12px;
        z-index: 10;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
      .panel-reopen:hover { background: #f5f5f5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
